[theme]
# הגדרת בסיס בהיר למערכת (מבטיח שהרקע יהיה בהיר)
base = "light"

# צבע ירוק-אמרלד לכפתורים, סרגלים והדגשות
# הצבע הזה כהה מספיק כדי שסטרימליט תהפוך אוטומטית את הטקסט על הכפתורים ללבן!
primaryColor = "#10B981"

# רקע האתר - לבן/אפרפר עדין מאוד כדי לא לסנוור
backgroundColor = "#F8FAFC"

# רקע משני (לסרגל הצד, אם יש)
secondaryBackgroundColor = "#F1F5F9"

# צבע הטקסט הכללי (אפור כהה-כחלחל, הרבה יותר נעים לקריאה משחור רגיל)
textColor = "#1E293B"
